<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Invaders</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#000;
    color:#fff;
    font-family:Arial,sans-serif;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    font-size:20px;
    z-index:10;
}

button{
    position:absolute;
    top:10px;
    right:10px;
    padding:10px 20px;
    cursor:pointer;
    font-size:16px;
}

canvas{
    display:block;
    margin:0 auto;
    background:#000;
    border:2px solid white;
}
</style>

</head>
<body>

<div id="ui">
    Score: <span id="score">0</span> |
    Lives: <span id="lives">3</span>
</div>

<button onclick="restartGame()">Restart</button>

<canvas id="game" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const livesEl = document.getElementById("lives");

let score;
let lives;
let gameOver;
let enemySpeed;
let enemyDir;
let bullets;
let enemies;
let keys = {};
let lastShot = 0;
const shootCooldown = 300;

const player = {
    x:370,
    y:550,
    w:60,
    h:20,
    speed:6
};

document.addEventListener("keydown",e=>{
    keys[e.key]=true;

    if(e.code==="Space"){
        e.preventDefault();
        shoot();
    }
});

document.addEventListener("keyup",e=>{
    keys[e.key]=false;
});

function createEnemies(){

    enemies=[];

    for(let row=0;row<5;row++){

        for(let col=0;col<10;col++){

            enemies.push({
                x:60+col*60,
                y:-250+row*50,
                targetY:50+row*50,
                w:40,
                h:30,
                alive:true,
                entering:true
            });

        }

    }

}

function shoot(){

    if(gameOver) return;

    let now=Date.now();

    if(now-lastShot<shootCooldown) return;

    lastShot=now;

    bullets.push({
        x:player.x+player.w/2-2,
        y:player.y,
        w:4,
        h:10,
        speed:8
    });

}

function updatePlayer(){

    if(keys["ArrowLeft"]||keys["a"]) player.x-=player.speed;
    if(keys["ArrowRight"]||keys["d"]) player.x+=player.speed;

    if(player.x<0) player.x=0;
    if(player.x+player.w>canvas.width)
        player.x=canvas.width-player.w;

}

function updateBullets(){

    bullets.forEach(b=>b.y-=b.speed);

    bullets=bullets.filter(b=>b.y>-20);

}

function updateEnemies(){

    let hitEdge=false;

    enemies.forEach(enemy=>{

        if(!enemy.alive) return;

        if(enemy.entering){

            enemy.y+=2;

            if(enemy.y>=enemy.targetY){

                enemy.y=enemy.targetY;
                enemy.entering=false;

            }

            return;

        }

        enemy.x+=enemySpeed*enemyDir;

        if(enemy.x<=0||enemy.x+enemy.w>=canvas.width){

            hitEdge=true;

        }

    });

    if(hitEdge){

        enemyDir*=-1;

        enemies.forEach(enemy=>{

            if(enemy.alive&&!enemy.entering){

                enemy.y+=20;

            }

        });

    }

}

function collision(a,b){

    return(
        a.x<b.x+b.w &&
        a.x+a.w>b.x &&
        a.y<b.y+b.h &&
        a.y+a.h>b.y
    );

}

function checkCollisions(){

    bullets=bullets.filter(bullet=>{

        let hit=false;

        enemies.forEach(enemy=>{

            if(enemy.alive&&collision(bullet,enemy)){

                enemy.alive=false;
                score+=10;
                hit=true;

            }

        });

        return !hit;

    });

    enemies.forEach(enemy=>{

        if(enemy.alive&&enemy.y+enemy.h>=player.y){

            enemy.alive=false;
            lives--;

            if(lives<=0){

                gameOver=true;

            }

        }

    });

    if(enemies.every(e=>!e.alive)){

        enemySpeed+=0.5;
        enemyDir=1;
        createEnemies();

    }

}

function drawPlayer(){

    ctx.fillStyle="lime";
    ctx.fillRect(player.x,player.y,player.w,player.h);

}

function drawBullets(){

    ctx.fillStyle="red";

    bullets.forEach(b=>{

        ctx.fillRect(b.x,b.y,b.w,b.h);

    });

}

function drawEnemies(){

    ctx.fillStyle="white";

    enemies.forEach(enemy=>{

        if(enemy.alive){

            ctx.fillRect(enemy.x,enemy.y,enemy.w,enemy.h);

        }

    });

}

function drawGameOver(){

    if(!gameOver) return;

    ctx.fillStyle="white";
    ctx.font="48px Arial";
    ctx.textAlign="center";
    ctx.fillText("GAME OVER",canvas.width/2,280);

    ctx.font="24px Arial";
    ctx.fillText("Press Restart",canvas.width/2,330);

}

function restartGame(){

    score=0;
    lives=3;
    gameOver=false;

    enemySpeed=1;
    enemyDir=1;

    bullets=[];

    player.x=370;

    createEnemies();

}

function gameLoop(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(!gameOver){

        updatePlayer();
        updateBullets();
        updateEnemies();
        checkCollisions();

    }

    drawPlayer();
    drawBullets();
    drawEnemies();
    drawGameOver();

    scoreEl.textContent=score;
    livesEl.textContent=lives;

    requestAnimationFrame(gameLoop);

}

restartGame();
gameLoop();

</script>

</body>
</html>
