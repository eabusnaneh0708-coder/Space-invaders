<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Invaders</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#000;
    color:#fff;
    font-family:Arial,sans-serif;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    font-size:20px;
    z-index:10;
}

button{
    position:absolute;
    top:10px;
    right:10px;
    padding:10px 20px;
    cursor:pointer;
    font-size:16px;
}

canvas{
    display:block;
    margin:0 auto;
    background:#000;
    border:2px solid white;
}
</style>

</head>
<body>

<div id="ui">
    Score: <span id="score">0</span> |
    Lives: <span id="lives">3</span>
</div>

<button onclick="restartGame()">Restart</button>

<canvas id="game" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const livesEl = document.getElementById("lives");

// --- constants (pulled out of magic numbers for readability) ---
const ENEMY_ROWS = 5;
const ENEMY_COLS = 10;
const ENEMY_W = 40;
const ENEMY_H = 30;
const ENEMY_ROW_SPACING = 50;
const ENEMY_COL_SPACING = 60;
const ENEMY_ENTRY_SPEED = 2;
const ENEMY_DROP_ON_EDGE = 20;
const STARTING_LIVES = 3;

let score;
let lives;
let gameOver;
let enemySpeed;
let enemyDir;
let bullets;
let enemies;
let keys = {};
let lastShot = 0;
const shootCooldown = 300;

const player = {
    x:370,
    y:550,
    w:60,
    h:20,
    speed:6
};

document.addEventListener("keydown",e=>{
    // Fix: normalize to lowercase so Shift/CapsLock doesn't break movement
    keys[e.key.toLowerCase()]=true;

    if(e.code==="Space"){
        e.preventDefault();
        shoot();
    }
});

document.addEventListener("keyup",e=>{
    keys[e.key.toLowerCase()]=false;
});

function createEnemies(){

    enemies=[];

    for(let row=0;row<ENEMY_ROWS;row++){

        for(let col=0;col<ENEMY_COLS;col++){

            enemies.push({
                x:60+col*ENEMY_COL_SPACING,
                // Fix: enemies used to start way off-screen (y:-250) which made the
                // board look empty/broken for the first couple of seconds. Starting
                // them just above the canvas gives a quick, visible entrance instead.
                y:-60-row*40,
                targetY:50+row*ENEMY_ROW_SPACING,
                w:ENEMY_W,
                h:ENEMY_H,
                alive:true,
                entering:true
            });

        }

    }

}

function shoot(){

    if(gameOver) return;

    let now=Date.now();

    if(now-lastShot<shootCooldown) return;

    lastShot=now;

    bullets.push({
        x:player.x+player.w/2-2,
        y:player.y,
        w:4,
        h:10,
        speed:8
    });

}

function updatePlayer(){

    if(keys["arrowleft"]||keys["a"]) player.x-=player.speed;
    if(keys["arrowright"]||keys["d"]) player.x+=player.speed;

    if(player.x<0) player.x=0;
    if(player.x+player.w>canvas.width)
        player.x=canvas.width-player.w;

}

function updateBullets(){

    bullets.forEach(b=>b.y-=b.speed);

    bullets=bullets.filter(b=>b.y>-20);

}

function updateEnemies(){

    let hitEdge=false;

    enemies.forEach(enemy=>{

        if(!enemy.alive) return;
